<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabBar 底部标签栏 - 年轻版设计系统</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body {
      padding: 20px;
      background-color: #f5f5f5;
      font-family: PingFang SC, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
    }

    .demo-header {
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .demo-title {
      font-size: 32px;
      margin-bottom: 8px;
      color: #1b1b1b;
    }

    .demo-description {
      font-size: 16px;
      color: #4e4f54;
      line-height: 1.6;
    }

    .demo-section {
      max-width: 1200px;
      margin: 0 auto 60px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 20px;
      color: #1b1b1b;
      border-bottom: 2px solid #e5e5e5;
      padding-bottom: 10px;
    }

    .demo-card {
      background: white;
      padding: 24px;
      border-radius: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #1b1b1b;
    }

    .card-description {
      font-size: 14px;
      color: #7e828c;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .preview-wrapper {
      border: 1px solid #e5e5e5;
      border-radius: 0;
      padding: 0;
      margin-bottom: 16px;
      background: white;
      overflow: hidden; /* 防止内容溢出 */
    }

    .preview-wrapper .yds-tabbar {
      width: 100%; /* 确保 TabBar 填充容器宽度 */
    }

    /* 图标容器 */
    .tabbar-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tabbar-icon img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1 class="demo-title">TabBar 底部标签栏</h1>
    <p class="demo-description">
      年轻版设计系统的底部标签栏组件，用于页面底部导航、标签切换等场景。
      支持 2-5 个标签，带底部安全区域和主页指示器。
    </p>
  </div>

  <script>
    // TabBar 切换交互
    document.querySelectorAll('.yds-tabbar__content').forEach(content => {
      content.querySelectorAll('.yds-tabbar__item').forEach(item => {
        item.addEventListener('click', function() {
          // 移除所有项的选中状态
          content.querySelectorAll('.yds-tabbar__item').forEach(i => {
            i.classList.remove('yds-tabbar__item--active');
          });
          // 添加当前项的选中状态
          this.classList.add('yds-tabbar__item--active');
        });
      });
    });
  </script>
