<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch 开关 - 年轻版设计系统</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body {
      padding: 20px;
      background-color: #f5f5f5;
    }

    .demo-header {
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .demo-title {
      font-size: 32px;
      margin-bottom: 8px;
      color: #1b1b1b;
    }

    .demo-description {
      font-size: 16px;
      color: #4e4f54;
      line-height: 1.6;
    }

    .demo-section {
      max-width: 1200px;
      margin: 0 auto 60px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 20px;
      color: #1b1b1b;
      border-bottom: 2px solid #e5e5e5;
      padding-bottom: 10px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .demo-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #1b1b1b;
    }

    .card-description {
      font-size: 14px;
      color: #7e828c;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .demo-dark {
      background: #1b1b1b;
      padding: 20px;
      border-radius: 8px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 12px;
      background-color: #f9fafb;
      border-radius: 8px;
    }

    .switch-label {
      font-size: 14px;
      color: #1b1b1b;
    }

    .switch-status {
      font-size: 12px;
      color: #7e828c;
    }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1 class="demo-title">Switch 开关</h1>
    <p class="demo-description">
      Switch 开关组件用于切换状态，支持三种尺寸和禁用状态。
      适用于设置选项、切换功能等场景。
    </p>
  </div>

  <!-- 三种尺寸 -->
  <div class="demo-section">
    <h2 class="section-title">三种尺寸</h2>

    <div class="demo-grid">
      <div class="demo-card">
        <h3 class="card-title">小尺寸</h3>
        <p class="card-description">38px × 24px</p>
        <div class="switch-row">
          <span class="switch-label">关闭</span>
          <button class="yds-switch yds-switch--small" data-id="small-1">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-small-1">关闭</span>
        </div>
        <div class="switch-row">
          <span class="switch-label">开启</span>
          <button class="yds-switch yds-switch--small yds-switch--checked" data-id="small-2">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-small-2">开启</span>
        </div>
      </div>

      <div class="demo-card">
        <h3 class="card-title">中尺寸</h3>
        <p class="card-description">46px × 28px</p>
        <div class="switch-row">
          <span class="switch-label">关闭</span>
          <button class="yds-switch yds-switch--medium" data-id="medium-1">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-medium-1">关闭</span>
        </div>
        <div class="switch-row">
          <span class="switch-label">开启</span>
          <button class="yds-switch yds-switch--medium yds-switch--checked" data-id="medium-2">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-medium-2">开启</span>
        </div>
      </div>

      <div class="demo-card">
        <h3 class="card-title">大尺寸</h3>
        <p class="card-description">52px × 32px</p>
        <div class="switch-row">
          <span class="switch-label">关闭</span>
          <button class="yds-switch yds-switch--large" data-id="large-1">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-large-1">关闭</span>
        </div>
        <div class="switch-row">
          <span class="switch-label">开启</span>
          <button class="yds-switch yds-switch--large yds-switch--checked" data-id="large-2">
            <span class="yds-switch__dot"></span>
          </button>
          <span class="switch-status" id="status-large-2">开启</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 禁用状态 -->
  <div class="demo-section">
    <h2 class="section-title">禁用状态</h2>

    <div class="demo-grid">
      <div class="demo-card">
        <h3 class="card-title">禁用 - 关闭</h3>
        <p class="card-description">禁用状态不可点击</p>
        <div class="switch-row">
          <span class="switch-label">禁用</span>
          <div class="yds-switch yds-switch--medium yds-switch--disabled">
            <span class="yds-switch__dot"></span>
          </div>
          <span class="switch-status">禁用</span>
        </div>
      </div>

      <div class="demo-card">
        <h3 class="card-title">禁用 - 开启</h3>
        <p class="card-description">禁用状态下保持开启样式</p>
        <div class="switch-row">
          <span class="switch-label">禁用</span>
          <div class="yds-switch yds-switch--medium yds-switch--checked yds-switch--disabled">
            <span class="yds-switch__dot"></span>
          </div>
          <span class="switch-status">禁用</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 实际使用场景 -->
  <div class="demo-section">
    <h2 class="section-title">实际使用场景</h2>

    <div class="demo-card">
      <h3 class="card-title">设置选项</h3>
      <p class="card-description">典型的设置界面开关选项</p>
      <div class="switch-row">
        <span class="switch-label">推送通知</span>
        <button class="yds-switch yds-switch--medium" data-id="scene-1">
          <span class="yds-switch__dot"></span>
        </button>
      </div>
      <div class="switch-row">
        <span class="switch-label">夜间模式</span>
        <button class="yds-switch yds-switch--medium yds-switch--checked" data-id="scene-2">
          <span class="yds-switch__dot"></span>
        </button>
      </div>
      <div class="switch-row">
        <span class="switch-label">自动同步</span>
        <button class="yds-switch yds-switch--medium" data-id="scene-3">
          <span class="yds-switch__dot"></span>
        </button>
      </div>
      <div class="switch-row">
        <span class="switch-label">勿扰模式</span>
        <button class="yds-switch yds-switch--medium yds-switch--checked" data-id="scene-4">
          <span class="yds-switch__dot"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="demo-section">
    <h2 class="section-title">控制演示</h2>

    <div class="demo-card">
      <h3 class="card-title">批量控制</h3>
      <p class="card-description">点击下方按钮控制所有开关</p>
      <div class="button-row" style="margin-top: 20px;">
        <button class="yds-button yds-button--solid-light yds-button--brand yds-button--medium" onclick="setAllChecked(true)">
          全部开启
        </button>
        <button class="yds-button yds-button--outlined yds-button--brand yds-button--medium" onclick="setAllChecked(false)">
          全部关闭
        </button>
        <button class="yds-button yds-button--solid-light yds-button--black yds-button--medium" onclick="toggleAll()">
          全部切换
        </button>
      </div>
    </div>
  </div>

  <script>
    // 初始化所有开关的点击事件
    document.querySelectorAll('.yds-switch').forEach(switchEl => {
      // 跳过禁用的开关
      if (switchEl.classList.contains('yds-switch--disabled')) {
        return;
      }

      switchEl.addEventListener('click', function() {
        // 切换开启/关闭状态
        const isChecked = this.classList.toggle('yds-switch--checked');

        // 更新状态文字（如果存在）
        const switchId = this.getAttribute('data-id');
        const statusEl = document.getElementById(`status-${switchId}`);
        if (statusEl) {
          statusEl.textContent = isChecked ? '开启' : '关闭';
        }
      });
    });

    // 场景开关事件
    document.querySelectorAll('[data-id^="scene-"]').forEach(switchEl => {
      switchEl.addEventListener('click', function() {
        this.classList.toggle('yds-switch--checked');
      });
    });

    // 全部开启
    function setAllChecked(checked) {
      document.querySelectorAll('[data-id^="small-"], [data-id^="medium-"], [data-id^="large-"], [data-id^="scene-"]').forEach(switchEl => {
        if (checked) {
          switchEl.classList.add('yds-switch--checked');
        } else {
          switchEl.classList.remove('yds-switch--checked');
        }
      });
    }

    // 全部切换
    function toggleAll() {
      document.querySelectorAll('[data-id^="small-"], [data-id^="medium-"], [data-id^="large-"], [data-id^="scene-"]').forEach(switchEl => {
        switchEl.classList.toggle('yds-switch--checked');
      });
    }
  </script>
</body>
</html>
