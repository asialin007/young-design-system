<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项 - 年轻版设计系统</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    /* ==================== 页面基础样式 ==================== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--yds-font-family-base, "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      background-color: var(--yds-bg-default-gray, #F4F5F7);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 页面容器 */
    .page-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--yds-bg-default-gray, #F4F5F7);
    }

    /* ==================== 主要内容区域 ==================== */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--yds-tabbar-height, 83px) + var(--yds-spacing-16, 16px));
    }

    /* ==================== 栅格系统 ==================== */
    /* 使用设计系统栅格类 */
    /* 栅格容器使用 .yds-grid，自动应用 12 列均分和 3px 间距 */
    /* 栅格单元格使用 .yds-grid__cell，配合 .yds-grid__cell-content 实现 8px 边距 */

    /* ==================== 顶部操作栏 ==================== */
    .action-bar {
      padding: 12px 0;  /* 上下 padding，左右由 .yds-grid__cell-content 提供 */
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--yds-bg-default-white, #FFFFFF);
    }

    .select-all-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .select-all-text {
      font-size: 14px;
      color: var(--yds-text-default-default, #1B1B1B);
    }

    .batch-actions {
      display: flex;
      gap: 8px;
    }

    /* ==================== 复选框样式 ==================== */
    /* 使用设计系统组件：.yds-checkbox，无需自定义样式 */

    /* ==================== 待办事项卡片 ==================== */
    .todo-card {
      background-color: var(--yds-bg-default-white, #FFFFFF);
      border: none; /* 年轻版设计系统：容器不添加边框 */
      border-radius: var(--yds-radius-none, 0px);
      padding: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s ease;
    }

    .todo-card:hover {
      background-color: var(--yds-bg-brand-secondary, rgba(247, 74, 217, 0.05));
    }

    .todo-card.selected {
      background-color: var(--yds-bg-brand-secondary, #FFF2FF);
    }

    .todo-card__checkbox {
      margin-top: 2px;
    }

    .todo-card__content {
      flex: 1;
      min-width: 0;
    }

    .todo-card__title {
      font-size: 15px;
      font-weight: 500;
      color: var(--yds-text-default-default, #1B1B1B);
      line-height: 22px;
      margin: 0 0 4px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .todo-card__desc {
      font-size: 13px;
      color: var(--yds-text-default-secondary, #4E4F54);
      line-height: 18px;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .todo-card__meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--yds-text-default-tertiary, #7E828C);
    }

    .todo-card__actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-card__action-btn {
      padding: 4px 8px;
      font-size: 12px;
      background: none;
      border: none;
      color: var(--yds-text-brand-default, #E52EC5);
      cursor: pointer;
      border-radius: var(--yds-radius-none, 0); /* 年轻版设计系统：直角设计 */
      transition: all 0.2s ease;
    }

    .todo-card__action-btn:hover {
      background-color: var(--yds-bg-brand-secondary, #FFF2FF);
    }

    /* ==================== 空状态 ==================== */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--yds-text-default-tertiary, #7E828C);
    }

    .empty-state__title {
      font-size: 16px;
      font-weight: 500;
      color: var(--yds-text-default-secondary, #4E4F54);
      margin: 0 0 8px 0;
    }

    .empty-state__desc {
      font-size: 14px;
      color: var(--yds-text-default-tertiary, #7E828C);
      margin: 0;
    }

    /* ==================== Dialog 对话框样式 ==================== */
    .yds-dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(27, 27, 27, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .yds-dialog {
      background-color: #ffffff;
      border-radius: 0;
      padding: 24px;
      min-width: 280px;
      max-width: 320px;
      box-shadow: none; /* 年轻版设计系统：容器不添加阴影 */
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .yds-dialog__title-section {
      margin-bottom: 16px;
    }

    .yds-dialog__title {
      font-size: 18px;
      font-weight: 500;
      color: #1b1b1b;
      margin: 0 0 8px 0;
      line-height: 22px;
    }

    .yds-dialog__body-text {
      font-size: 14px;
      color: #1b1b1b;
      line-height: 22px;
      margin: 0;
      padding: 0;
    }

    .yds-dialog__buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .yds-dialog__buttons--horizontal {
      flex-direction: row;
    }

    .yds-dialog__button {
      flex: 1;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 72px;
      height: 38px;
    }

    .yds-dialog__button--primary {
      background-color: #1b1b1b;
      color: #ffffff;
    }

    .yds-dialog__button--secondary {
      background-color: #f4f5f7;
      color: #1b1b1b;
    }

    /* ==================== 固定 Navbar 和 TabBar ==================== */
    .yds-navbar--fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .yds-tabbar--fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    /* 为固定导航栏和 TabBar 留出空间 */
    .main-content {
      padding-top: calc(44px + 44px + var(--yds-spacing-16, 16px));
    }

    /* 隐藏元素 */
    .hidden {
      display: none !important;
    }

    /* 批量操作模式 */
    .batch-mode .action-bar {
      position: sticky;
      top: calc(44px + 44px);
      z-index: 50;
    }
  </style>
</head>
<body>

  <!-- ==================== JavaScript 交互 ==================== -->
  <script>
    // ==================== 状态管理 ====================
    const state = {
      selectedItems: new Set(),
      isSelectAll: false
    };

    // ==================== DOM 元素 ====================
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');
    const todoCards = document.querySelectorAll('.todo-card');
    const shareBtn = document.getElementById('shareBtn');
    const searchInput = document.getElementById('searchInput');

    // ==================== 复选框功能 ====================
    function toggleCheckbox(checkboxLabel) {
      const checkboxInput = checkboxLabel.querySelector('.yds-checkbox__input');
      const isChecked = checkboxInput.checked;

      // 切换选中状态
      checkboxInput.checked = !isChecked;
      checkboxLabel.classList.toggle('yds-checkbox--checked', !isChecked);

      const card = checkboxLabel.closest('.todo-card');
      const id = card.dataset.id;

      if (!isChecked) {
        state.selectedItems.add(id);
        card.classList.add('selected');
      } else {
        state.selectedItems.delete(id);
        card.classList.remove('selected');
      }

      updateBatchActions();
      updateSelectAllState();
    }

    function updateBatchActions() {
      if (state.selectedItems.size > 0) {
        batchDeleteBtn.classList.remove('hidden');
      } else {
        batchDeleteBtn.classList.add('hidden');
      }
    }

    function updateSelectAllState() {
      const totalItems = todoCards.length;
      const selectedCount = state.selectedItems.size;

      const selectAllInput = selectAllCheckbox.querySelector('.yds-checkbox__input');

      if (selectedCount === 0) {
        state.isSelectAll = false;
        selectAllInput.checked = false;
        selectAllCheckbox.classList.remove('yds-checkbox--checked');
      } else if (selectedCount === totalItems) {
        state.isSelectAll = true;
        selectAllInput.checked = true;
        selectAllCheckbox.classList.add('yds-checkbox--checked');
      }
    }

    function selectAll() {
      state.isSelectAll = !state.isSelectAll;

      const selectAllInput = selectAllCheckbox.querySelector('.yds-checkbox__input');
      selectAllInput.checked = state.isSelectAll;
      selectAllCheckbox.classList.toggle('yds-checkbox--checked', state.isSelectAll);

      todoCards.forEach(card => {
        const checkboxLabel = card.querySelector('.yds-checkbox');
        const checkboxInput = checkboxLabel.querySelector('.yds-checkbox__input');
        const id = card.dataset.id;

        checkboxInput.checked = state.isSelectAll;
        checkboxLabel.classList.toggle('yds-checkbox--checked', state.isSelectAll);

        if (state.isSelectAll) {
          card.classList.add('selected');
          state.selectedItems.add(id);
        } else {
          card.classList.remove('selected');
          state.selectedItems.delete(id);
        }
      });

      updateBatchActions();
    }

    // ==================== 复选框事件监听 ====================
    // 为每个复选框 input 添加 change 事件
    document.querySelectorAll('.yds-checkbox__input').forEach(input => {
      input.addEventListener('change', function() {
        const checkboxLabel = this.closest('.yds-checkbox');
        const isChecked = this.checked;
        checkboxLabel.classList.toggle('yds-checkbox--checked', isChecked);

        const card = checkboxLabel.closest('.todo-card');
        const id = card.dataset.id;

        if (isChecked) {
          state.selectedItems.add(id);
          card.classList.add('selected');
        } else {
          state.selectedItems.delete(id);
          card.classList.remove('selected');
        }

        updateBatchActions();
        updateSelectAllState();
      });
    });

    // 全选复选框
    const selectAllInput = selectAllCheckbox.querySelector('.yds-checkbox__input');
    selectAllInput.addEventListener('change', selectAll);

    // ==================== 删除功能 ====================
    function createDialog(config) {
      const overlay = document.createElement('div');
      overlay.className = 'yds-dialog-overlay';

      const dialog = document.createElement('div');
      dialog.className = 'yds-dialog';
      dialog.setAttribute('role', 'dialog');
      dialog.setAttribute('aria-modal', 'true');

      // 标题
      if (config.title) {
        const titleSection = document.createElement('div');
        titleSection.className = 'yds-dialog__title-section';

        const title = document.createElement('h2');
        title.className = 'yds-dialog__title';
        title.textContent = config.title;
        titleSection.appendChild(title);

        dialog.appendChild(titleSection);
      }

      // 内容
      if (config.content) {
        const bodyText = document.createElement('div');
        bodyText.className = 'yds-dialog__body-text';
        bodyText.innerHTML = config.content;
        dialog.appendChild(bodyText);
      }

      // 按钮区域
      const buttonsDiv = document.createElement('div');
      buttonsDiv.className = 'yds-dialog__buttons yds-dialog__buttons--horizontal';

      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'yds-dialog__button yds-dialog__button--secondary';
      cancelBtn.textContent = config.cancelText || '取消';
      cancelBtn.onclick = () => {
        document.body.removeChild(overlay);
        if (config.onCancel) config.onCancel();
      };

      const confirmBtn = document.createElement('button');
      confirmBtn.type = 'button';
      confirmBtn.className = 'yds-dialog__button yds-dialog__button--primary';
      confirmBtn.textContent = config.confirmText || '确认';
      confirmBtn.onclick = () => {
        document.body.removeChild(overlay);
        if (config.onConfirm) config.onConfirm();
      };

      buttonsDiv.appendChild(cancelBtn);
      buttonsDiv.appendChild(confirmBtn);
      dialog.appendChild(buttonsDiv);

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);

      // 点击遮罩层关闭
      overlay.onclick = (e) => {
        if (e.target === overlay) {
          document.body.removeChild(overlay);
          if (config.onCancel) config.onCancel();
        }
      };

      // ESC 键关闭
      const handleEscape = (e) => {
        if (e.key === 'Escape') {
          document.body.removeChild(overlay);
          document.removeEventListener('keydown', handleEscape);
          if (config.onCancel) config.onCancel();
        }
      };
      document.addEventListener('keydown', handleEscape);
    }

    // 删除单个待办事项
    function deleteTodoItem(id) {
      createDialog({
        title: '确认删除',
        content: '确定要删除这个待办事项吗？删除后无法恢复。',
        cancelText: '取消',
        confirmText: '删除',
        onConfirm: () => {
          const card = document.querySelector(`.todo-card[data-id="${id}"]`);
          if (card) {
            const cell = card.closest('.yds-grid__cell');
            cell.style.opacity = '0';
            cell.style.transform = 'translateX(100%)';
            cell.style.transition = 'all 0.3s ease';

            setTimeout(() => {
              cell.remove();
              state.selectedItems.delete(id);

              // 检查是否还有待办事项
              const remainingCards = document.querySelectorAll('.todo-card');
              if (remainingCards.length === 0) {
                showEmptyState();
              }

              updateBatchActions();
              updateSelectAllState();
            }, 300);
          }
          console.log('已删除待办事项:', id);
        },
        onCancel: () => {
          console.log('取消删除');
        }
      });
    }

    // 批量删除
    function deleteSelectedItems() {
      const count = state.selectedItems.size;
      createDialog({
        title: '确认删除',
        content: `确定要删除选中的 ${count} 个待办事项吗？删除后无法恢复。`,
        cancelText: '取消',
        confirmText: '删除',
        onConfirm: () => {
          const idsToDelete = Array.from(state.selectedItems);

          idsToDelete.forEach((id, index) => {
            setTimeout(() => {
              const card = document.querySelector(`.todo-card[data-id="${id}"]`);
              if (card) {
                const cell = card.closest('.yds-grid__cell');
                cell.style.opacity = '0';
                cell.style.transform = 'translateX(100%)';
                cell.style.transition = 'all 0.3s ease';

                setTimeout(() => {
                  cell.remove();
                }, 300);
              }
            }, index * 100);
          });

          // 清空选中状态
          state.selectedItems.clear();
          updateBatchActions();
          updateSelectAllState();

          // 检查是否还有待办事项
          setTimeout(() => {
            const remainingCards = document.querySelectorAll('.todo-card');
            if (remainingCards.length === 0) {
              showEmptyState();
            }
          }, idsToDelete.length * 100 + 300);

          console.log('已批量删除:', idsToDelete);
        },
        onCancel: () => {
          console.log('取消批量删除');
        }
      });
    }

    // 显示空状态
    function showEmptyState() {
      const todoGrid = document.querySelector('.yds-grid');
      if (todoGrid) {
        todoGrid.innerHTML = `
          <div class="yds-grid__cell yds-grid__cell--12">
            <div class="yds-grid__cell-content">
              <div class="empty-state">
                <h3 class="empty-state__title">暂无待办事项</h3>
                <p class="empty-state__desc">点击下方按钮添加新的待办事项</p>
              </div>
            </div>
          </div>
        `;
      }
    }

    // 绑定删除按钮事件
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const card = this.closest('.todo-card');
        const id = card.dataset.id;
        deleteTodoItem(id);
      });
    });

    // 批量删除按钮
    batchDeleteBtn.addEventListener('click', deleteSelectedItems);

    // ==================== TabBar 切换 ====================
    document.querySelectorAll('.yds-tabbar__item').forEach(item => {
      item.addEventListener('click', function() {
        const tabbar = this.closest('.yds-tabbar__content');
        tabbar.querySelectorAll('.yds-tabbar__item').forEach(i => {
          i.classList.remove('yds-tabbar__item--active');
        });
        this.classList.add('yds-tabbar__item--active');
      });
    });

    // ==================== 搜索功能 ====================
    searchInput.addEventListener('input', function(e) {
      const searchTerm = e.target.value.toLowerCase();
      todoCards.forEach(card => {
        const title = card.querySelector('.todo-card__title').textContent.toLowerCase();
        const desc = card.querySelector('.todo-card__desc').textContent.toLowerCase();

        if (title.includes(searchTerm) || desc.includes(searchTerm)) {
          card.closest('.todo-grid__cell').style.display = 'block';
        } else {
          card.closest('.todo-grid__cell').style.display = 'none';
        }
      });
    });

    // ==================== 分享功能 ====================
    shareBtn.addEventListener('click', function() {
      createDialog({
        title: '分享待办清单',
        content: '分享功能将把您的待办事项列表生成链接或图片，方便分享给好友。',
        cancelText: '取消',
        confirmText: '生成分享',
        onConfirm: () => {
          console.log('生成分享内容');
          // 这里可以实现实际的分享逻辑
          alert('分享链接已复制到剪贴板！');
        }
      });
    });

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
      // Ctrl/Cmd + A 全选
      if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
        e.preventDefault();
        if (!state.isSelectAll) {
          selectAll();
        }
      }

      // Delete 删除选中项
      if (e.key === 'Delete' && state.selectedItems.size > 0) {
        deleteSelectedItems();
      }
    });
  </script>
</body>
</html>
