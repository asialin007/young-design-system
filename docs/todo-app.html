<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待办事项 - 年轻版设计系统</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/grid.css">
    <link rel="stylesheet" href="../css/dialog.css">
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--yds-font-family-base);
            background-color: var(--yds-bg-default-gray);
            color: var(--yds-text-default-default);
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 83px; /* 底部导航栏高度 (49px + 34px) */
        }

        /* ✅ 规范6：栅格均分屏幕宽度 */
        .main-content.yds-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr); /* 12列均分屏幕 */
            gap: var(--yds-spacing-8); /* 栅格间距8px */
            padding: 0 var(--yds-spacing-8); /* 容器左右边距8px */
            box-sizing: border-box;
        }

        /* 待办事项卡片 - 直角设计（年轻版规范） */
        .todo-card {
            background-color: var(--yds-bg-default-white);
            border-radius: var(--yds-radius-none);
            padding: var(--yds-spacing-16);
            margin-bottom: var(--yds-spacing-12);
            box-shadow: none; /* 扁平化设计：无阴影 */
            border: 1px solid var(--yds-border-default-light);
        }

        .todo-card__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--yds-spacing-12);
        }

        .todo-card__title {
            font-size: var(--yds-font-size-15);
            font-weight: var(--yds-font-weight-medium);
            color: var(--yds-text-default-default);
        }

        .todo-card__count {
            font-size: var(--yds-font-size-12);
            color: var(--yds-text-default-secondary);
            background-color: var(--yds-bg-default-gray);
            padding: 4px 8px;
            border-radius: var(--yds-radius-full);
        }

        /* 待办事项列表 */
        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            padding: var(--yds-spacing-12) 0;
            border-bottom: 1px solid var(--yds-border-default-light);
            gap: var(--yds-spacing-12);
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        /* 待办事项内容 */
        .todo-item__content {
            flex: 1;
            padding-top: 2px;
        }

        .todo-item__text {
            font-size: var(--yds-font-size-14);
            color: var(--yds-text-default-default);
            line-height: var(--yds-line-height-20);
            transition: all 0.2s;
        }

        .todo-item__text.completed {
            text-decoration: line-through;
            color: var(--yds-text-default-disabled);
        }

        .todo-item__meta {
            font-size: var(--yds-font-size-12);
            color: var(--yds-text-default-tertiary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: var(--yds-spacing-8);
        }

        /* 优先级标签 */
        .priority-tag {
            font-size: var(--yds-font-size-11);
            padding: 2px 6px;
            border-radius: var(--yds-radius-sm);
            font-weight: var(--yds-font-weight-medium);
        }

        .priority-tag--high {
            background-color: var(--yds-bg-danger-secondary);
            color: var(--yds-text-danger-default);
        }

        .priority-tag--medium {
            background-color: var(--yds-bg-warning-secondary);
            color: var(--yds-text-warning-default);
        }

        .priority-tag--low {
            background-color: var(--yds-bg-positive-secondary);
            color: var(--yds-text-positive-default);
        }

        /* 添加任务区域 */
        .add-task-section {
            margin-top: var(--yds-spacing-16);
        }

        /* 固定顶部导航栏 */
        .yds-navbar--fixed-top {
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 固定底部 TabBar */
        .yds-tabbar--fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            z-index: 100;
        }

        /* Dialog 隐藏状态 */
        .yds-dialog-overlay.hidden {
            display: none;
        }

        /* ✅ 规范7：深色按钮的图标使用白色 */
        .yds-button--solid-dark .yds-icon {
            filter: brightness(0) invert(1);
        }

        /* ✅ 规范8：TabBar 选中态图标使用品牌色 Icon/Brand/Default (#F74AD9) */
        /* 注意：TabBar CSS 已经定义了选中状态的颜色，这里不需要额外覆盖 */
        /* TabBar CSS 会自动应用：
           - 文字颜色：--yds-text-brand-default (#E52EC5)
           - 图标颜色：--yds-icon-brand-default (#F74AD9)
        */
    </style>
</head>
<body>
    <!-- 顶部导航栏 - 使用 YDS Navbar 组件 -->
    <nav class="yds-navbar yds-navbar--fixed-top">
        <div class="yds-navbar__content">
            <!-- 搜索框 -->
            <div class="yds-navbar__search-box">
                <div class="yds-navbar__search-icon">
                    <!-- ✅ 规范：从图标库调用 -->
                    <img src="../icons/y_icon_line_edit_search.svg" class="yds-icon" alt="搜索">
                </div>
                <input
                    type="text"
                    class="yds-navbar__search-input"
                    placeholder="搜索待办事项..."
                >
            </div>
            <!-- 右侧操作区 -->
            <div class="yds-navbar__right">
                <!-- 购物车按钮 - 使用 YDS Icon Button -->
                <div class="yds-navbar__action-badge">
                    <button class="yds-navbar__action-icon">
                        <!-- ✅ 规范：从图标库调用 -->
                        <img src="../icons/y_icon_line_generality_shoppingcart.svg" class="yds-icon" alt="购物车">
                    </button>
                    <span class="yds-navbar__badge">3</span>
                </div>
                <!-- 更多按钮 -->
                <button class="yds-navbar__action-icon">
                    <!-- ✅ 规范：从图标库调用 -->
                    <img src="../icons/y_icon_line_generality_more.svg" class="yds-icon" alt="更多">
                </button>
            </div>
        </div>
    </nav>

    <!-- ✅ 规范6：主内容区域使用栅格布局（左右边距8px） -->
    <main class="yds-grid main-content">
        <div class="yds-grid__cell yds-grid__cell--12">
            <!-- 进行中的任务 -->
        <div class="todo-card">
            <div class="todo-card__header">
                <h2 class="todo-card__title">进行中</h2>
                <span class="todo-card__count">3项</span>
            </div>
            <ul class="todo-list">
                <li class="todo-item">
                    <!-- 使用 YDS Checkbox 组件 -->
                    <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand">
                        <input type="checkbox" class="yds-checkbox__input">
                        <span class="yds-checkbox__box"></span>
                    </label>
                    <div class="todo-item__content">
                        <p class="todo-item__text">完成产品原型设计</p>
                        <div class="todo-item__meta">
                            <span class="priority-tag priority-tag--high">高优先级</span>
                            <span>今天 18:00</span>
                        </div>
                    </div>
                </li>
                <li class="todo-item">
                    <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand">
                        <input type="checkbox" class="yds-checkbox__input">
                        <span class="yds-checkbox__box"></span>
                    </label>
                    <div class="todo-item__content">
                        <p class="todo-item__text">团队周会准备</p>
                        <div class="todo-item__meta">
                            <span class="priority-tag priority-tag--medium">中优先级</span>
                            <span>明天 10:00</span>
                        </div>
                    </div>
                </li>
                <li class="todo-item">
                    <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand">
                        <input type="checkbox" class="yds-checkbox__input">
                        <span class="yds-checkbox__box"></span>
                    </label>
                    <div class="todo-item__content">
                        <p class="todo-item__text">更新设计系统文档</p>
                        <div class="todo-item__meta">
                            <span class="priority-tag priority-tag--low">低优先级</span>
                            <span>本周五</span>
                        </div>
                    </div>
                </li>
            </ul>
        </div>

        <!-- 已完成的任务 -->
        <div class="todo-card">
            <div class="todo-card__header">
                <h2 class="todo-card__title">已完成</h2>
                <span class="todo-card__count">2项</span>
            </div>
            <ul class="todo-list">
                <li class="todo-item">
                    <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand yds-checkbox--checked">
                        <input type="checkbox" class="yds-checkbox__input" checked>
                        <span class="yds-checkbox__box"></span>
                    </label>
                    <div class="todo-item__content">
                        <p class="todo-item__text completed">审查前端代码</p>
                        <div class="todo-item__meta">
                            <span>已完成</span>
                        </div>
                    </div>
                </li>
                <li class="todo-item">
                    <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand yds-checkbox--checked">
                        <input type="checkbox" class="yds-checkbox__input" checked>
                        <span class="yds-checkbox__box"></span>
                    </label>
                    <div class="todo-item__content">
                        <p class="todo-item__text completed">整理Figma组件库</p>
                        <div class="todo-item__meta">
                            <span>已完成</span>
                        </div>
                    </div>
                </li>
            </ul>
        </div>

        <!-- 添加新任务按钮 - 使用 YDS XL 黑色按钮（年轻版规范） -->
        <div class="add-task-section">
            <button id="addTaskBtn" class="yds-button yds-button--solid-dark yds-button--black yds-button--xl" style="width: 100%;">
                <!-- ✅ 规范：从图标库调用，图标自动调整为 18px × 18px -->
                <img src="../icons/y_icon_line_edit_add.svg" class="yds-icon" alt="添加">
                添加新任务
            </button>
        </div>
        </div><!-- 关闭 yds-grid__cell -->
    </main>

    <!-- 底部选项卡 - 使用 YDS TabBar 组件 -->
    <nav class="yds-tabbar yds-tabbar--fixed-bottom">
        <div class="yds-tabbar__content">
            <!-- 首页 - 激活状态 -->
            <button class="yds-tabbar__item yds-tabbar__item--active" data-tab="home">
                <div class="yds-tabbar__icon">
                    <!-- ✅ 规范：使用内联 SVG + currentColor 实现选中状态品牌色 -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 16.999H7V14.999H17V16.999Z" fill="currentColor"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12.6045 2.46973C12.6075 2.47203 12.6112 2.47422 12.6143 2.47656L20.6143 8.69824C20.6197 8.70249 20.6245 8.70756 20.6299 8.71191L21 9V21H3V9L3.36914 8.71191C3.37469 8.7074 3.38008 8.70265 3.38574 8.69824L11.3857 2.47656C11.3886 2.47438 11.3917 2.47188 11.3945 2.46973L12 2L12.6045 2.46973ZM5 9.97754V18.999H19V9.97754L12 4.5332L5 9.97754Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="yds-tabbar__label">首页</span>
            </button>
            <!-- 收藏 -->
            <button class="yds-tabbar__item" data-tab="favorites">
                <div class="yds-tabbar__icon">
                    <!-- ✅ 规范：使用内联 SVG + currentColor 实现选中状态品牌色 -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.001 4.52853C14.35 2.42 17.98 2.49 20.2426 4.75736C22.5053 7.02472 22.583 10.637 20.4786 12.993L11.9999 21.485L3.52138 12.993C1.41705 10.637 1.49571 7.01901 3.75736 4.75736C6.02157 2.49315 9.64519 2.41687 12.001 4.52853ZM18.827 6.1701C17.3279 4.66794 14.9076 4.60701 13.337 6.01687L12.0019 7.21524L10.6661 6.01781C9.09098 4.60597 6.67506 4.66808 5.17157 6.17157C3.68183 7.66131 3.60704 10.0473 4.97993 11.6232L11.9999 18.6543L19.0201 11.6232C20.3935 10.0467 20.319 7.66525 18.827 6.1701Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="yds-tabbar__label">收藏</span>
            </button>
            <!-- 我的 -->
            <button class="yds-tabbar__item" data-tab="profile">
                <div class="yds-tabbar__icon">
                    <!-- ✅ 规范：使用内联 SVG + currentColor 实现选中状态品牌色 -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 22.5C4 18.0817 7.58172 14.5 12 14.5C16.4183 14.5 20 18.0817 20 22.5H18C18 19.1863 15.3137 16.5 12 16.5C8.68629 16.5 6 19.1863 6 22.5H4ZM12 13.5C8.685 13.5 6 10.815 6 7.5C6 4.185 8.685 1.5 12 1.5C15.315 1.5 18 4.185 18 7.5C18 10.815 15.315 13.5 12 13.5ZM12 11.5C14.21 11.5 16 9.71 16 7.5C16 5.29 14.21 3.5 12 3.5C9.79 3.5 8 5.29 8 7.5C8 9.71 9.79 11.5 12 11.5Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="yds-tabbar__label">我的</span>
            </button>
        </div>
        <div class="yds-tabbar__safe-area">
            <div class="yds-tabbar__indicator"></div>
        </div>
    </nav>

    <!-- ✅ 规范：使用 YDS Dialog 组件（二次确认对话框） -->
    <div id="taskDialog" class="yds-dialog-overlay hidden">
        <div class="yds-dialog">
            <!-- 关闭按钮 -->
            <button class="yds-dialog__close" onclick="closeDialog()" aria-label="关闭">
                <img src="../icons/y_icon_line_edit_close.svg" class="yds-icon" alt="关闭">
            </button>

            <!-- 标题区域 -->
            <div class="yds-dialog__title-section">
                <h3 class="yds-dialog__title">添加新任务</h3>
            </div>

            <!-- 内容区域 -->
            <div class="yds-dialog__content">
                <p class="yds-dialog__body-text">确定要添加新任务吗？</p>
            </div>

            <!-- 按钮区域 -->
            <div class="yds-dialog__buttons yds-dialog__buttons--horizontal">
                <button class="yds-dialog__button yds-dialog__button--secondary" onclick="closeDialog()">取消</button>
                <button class="yds-dialog__button yds-dialog__button--primary" onclick="confirmAddTask()">确认</button>
            </div>
        </div>
    </div>

    <script>
        // TabBar 切换功能
        const tabItems = document.querySelectorAll('.yds-tabbar__item');
        tabItems.forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有激活状态
                tabItems.forEach(tab => tab.classList.remove('yds-tabbar__item--active'));
                // 添加当前激活状态
                this.classList.add('yds-tabbar__item--active');
            });
        });

        // Checkbox 切换功能
        const checkboxes = document.querySelectorAll('.yds-checkbox');
        checkboxes.forEach(checkbox => {
            const input = checkbox.querySelector('input');
            const text = checkbox.nextElementSibling?.querySelector('.todo-item__text');

            input.addEventListener('change', function() {
                if (this.checked) {
                    checkbox.classList.add('yds-checkbox--checked');
                    if (text) text.classList.add('completed');
                } else {
                    checkbox.classList.remove('yds-checkbox--checked');
                    if (text) text.classList.remove('completed');
                }
            });
        });

        // ✅ 规范：使用 YDS Dialog 组件（二次确认）
        const dialog = document.getElementById('taskDialog');
        const addButton = document.getElementById('addTaskBtn');

        // 打开对话框
        addButton.addEventListener('click', function() {
            dialog.classList.remove('hidden');
        });

        // 关闭对话框
        function closeDialog() {
            dialog.classList.add('hidden');
        }

        // 确认添加任务
        function confirmAddTask() {
            const todoList = document.querySelector('.todo-list');
            const newItem = document.createElement('li');
            newItem.className = 'todo-item';
            newItem.innerHTML = `
                <label class="yds-checkbox yds-checkbox--large yds-checkbox--brand">
                    <input type="checkbox" class="yds-checkbox__input">
                    <span class="yds-checkbox__box"></span>
                </label>
                <div class="todo-item__content">
                    <p class="todo-item__text">新待办事项</p>
                    <div class="todo-item__meta">
                        <span class="priority-tag priority-tag--medium">中优先级</span>
                        <span>刚刚</span>
                    </div>
                </div>
            `;
            todoList.insertBefore(newItem, todoList.firstChild);

            // 为新添加的 checkbox 绑定事件
            const newCheckbox = newItem.querySelector('.yds-checkbox');
            const newInput = newCheckbox.querySelector('input');
            const newText = newCheckbox.nextElementSibling?.querySelector('.todo-item__text');

            newInput.addEventListener('change', function() {
                if (this.checked) {
                    newCheckbox.classList.add('yds-checkbox--checked');
                    if (newText) newText.classList.add('completed');
                } else {
                    newCheckbox.classList.remove('yds-checkbox--checked');
                    if (newText) newText.classList.remove('completed');
                }
            });

            closeDialog();
        }

        // 点击遮罩层关闭对话框
        dialog.addEventListener('click', function(e) {
            if (e.target === dialog) {
                closeDialog();
            }
        });

        // ESC 键关闭对话框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !dialog.classList.contains('hidden')) {
                closeDialog();
            }
        });

        // 搜索功能
        const searchInput = document.querySelector('.yds-navbar__search-input');
        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const allTasks = document.querySelectorAll('.todo-item');

            allTasks.forEach(task => {
                const text = task.querySelector('.todo-item__text').textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    task.style.display = 'flex';
                } else {
                    task.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
