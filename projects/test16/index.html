<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>全部筛选</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 页面容器 */
    .page-container {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      background: #f5f5f5;
    }

    /* 背景层 */
    .bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 375px;
      height: 813px;
      z-index: 0;
    }
    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 弹出层容器 */
    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 375px;
      height: 812px;
      z-index: 1;
    }

    /* 遮罩层 */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(27, 27, 27, 0.85);
      transition: opacity 0.3s ease;
    }

    /* 底部弹出层 */
    .modal-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 654px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      background: white;
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .popup.showing .modal-bottom {
      transform: translateY(0);
    }
    .popup.showing .overlay {
      opacity: 1;
    }
    .popup:not(.showing) .overlay {
      opacity: 0;
    }
    .popup.hiding .modal-bottom {
      transform: translateY(100%);
    }
    .popup.hiding .overlay {
      opacity: 0;
    }

    /* 弹出层导航栏 */
    .modal-header {
      width: 100%;
      height: 54px;
      background: white;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: none;
      flex-shrink: 0;
    }
    .modal-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      width: 280px;
      overflow: hidden;
    }
    .modal-title span {
      font-size: 18px;
      font-weight: 500;
      line-height: 22px;
      color: #1b1b1b;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .modal-close {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close img {
      width: 14px;
      height: 14px;
      display: block;
    }

    /* 内容区域 */
    .modal-body {
      width: 100%;
      display: flex;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    /* 左侧 sidebar */
    .sidebar {
      width: 80px;
      background: #f3f4f5;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .sidebar::-webkit-scrollbar {
      display: none;
    }
    .sidebar-item {
      width: 80px;
      padding: 12px 8px;
      display: flex;
      align-items: center;
      background: #f3f4f5;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar-text-group {
      display: inline-flex;
      align-items: flex-start;
      gap: 2px;
      max-width: 100%;
    }
    .sidebar-text-group span {
      font-size: 12px;
      line-height: 14px;
      color: #585c64;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-all;
      min-width: 0;
    }
    /* 红点指示器 */
    .red-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f03867;
      flex-shrink: 0;
      display: none;
      margin-top: 2px;
    }
    .red-dot.visible {
      display: block;
    }
    /* 选中态 */
    .sidebar-item.active {
      background: white;
    }
    .sidebar-item.active span {
      color: #ff0777;
      font-weight: 500;
    }
    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 24px;
      background: #f03867;
      border-radius: 6px;
    }

    /* 右侧内容 feeds */
    .feeds {
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: white;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .feeds::-webkit-scrollbar {
      display: none;
    }
    .feeds-content {
      background: white;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 筛选分组 */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .filter-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .filter-group-title h3 {
      font-size: 13px;
      font-weight: 500;
      line-height: 18px;
      color: #1b1b1b;
      white-space: nowrap;
    }
    .filter-group-title .expand-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .filter-group-title .expand-btn span {
      font-size: 12px;
      line-height: 16px;
      color: #5f5f5f;
      white-space: nowrap;
    }
    .filter-group-title .expand-btn .arrow-icon {
      width: 10px;
      height: 10px;
    }

    /* 标签网格 */
    .tag-grid {
      display: grid;
      gap: 4px;
      width: 100%;
    }
    .tag-grid.cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }
    .tag-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }
    .tag {
      height: 36px;
      background: #f7f7f7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      cursor: pointer;
      border: none;
      outline: none;
      font-family: inherit;
    }
    .tag span {
      font-size: 12px;
      line-height: 16px;
      color: #1b1b1b;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-all;
      flex: 1;
      min-width: 0;
      font-weight: 400;
    }
    .tag.disabled span {
      color: #c6c6c6;
    }
    .tag.more-tag {
      gap: 2px;
    }
    .tag.more-tag span {
      color: #5f5f5f;
      flex: none;
    }
    .tag.more-tag .arrow-right {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      display: block;
    }

    /* 价格输入区 */
    .price-input-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      height: 36px;
      position: relative;
    }
    .price-input {
      height: 36px;
      background: #f7f7f7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      cursor: pointer;
      border: none;
      outline: none;
    }
    .price-input span {
      font-size: 12px;
      line-height: 16px;
      color: #c6c6c6;
      text-align: center;
    }
    .price-input input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 12px;
      line-height: 16px;
      color: #1b1b1b;
      text-align: center;
      outline: none;
      font-family: inherit;
    }
    .price-input input::placeholder {
      color: #c6c6c6;
    }
    .price-line {
      position: absolute;
      left: calc(50% + 0.5px);
      top: calc(50% - 0.5px);
      transform: translate(-50%, -50%);
      width: 8px;
      height: 1px;
      background: #1b1b1b;
    }

    /* 标签选中态 */
    .tag.selected {
      background: rgba(255, 7, 119, 0.08);
      border: 1px solid #ff0777;
    }
    .tag.selected span {
      color: #ff0777;
    }

    /* 底部按钮栏 */
    .modal-footer {
      width: 100%;
      background: white;
      border-top: 0.5px solid #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex-shrink: 0;
    }
    .button-group {
      width: 100%;
      display: flex;
      gap: 12px;
      padding: 12px;
      justify-content: center;
    }
    .btn {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      overflow: hidden;
      min-width: 72px;
      max-width: 351px;
    }
    .btn span {
      font-size: 16px;
      line-height: 20px;
      white-space: nowrap;
    }
    .btn-reset {
      background: #f7f7f7;
    }
    .btn-reset span {
      font-weight: 400;
      color: #1b1b1b;
    }
    .btn-confirm {
      background: linear-gradient(-17.76deg, #ff11a0 23.1%, #ff0777 91.06%);
    }
    .btn-confirm span {
      font-weight: 500;
      color: white;
    }

    /* Home Indicator */
    .home-indicator {
      width: 100%;
      height: 34px;
      position: relative;
    }
    .home-indicator-line {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 135px;
      height: 5px;
      background: #1b1b1b;
      border-radius: 100px;
    }

    /* 展开按钮箭头旋转 */
    .expand-btn .arrow-icon {
      transition: transform 0.25s ease;
      transform: rotate(180deg); /* 默认收起：箭头朝下 */
    }
    .expand-btn.expanded .arrow-icon {
      transform: rotate(0deg); /* 展开后：箭头朝上 */
    }

    /* 展开折叠区域 */
    .expand-content {
      display: none;
      margin-top: -8px;
    }
    .expand-content.show {
      display: grid;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 背景层 -->
    <div class="bg-layer" onclick="openPopup()">
      <img src="images/bg.jpg" alt="">
    </div>

    <!-- 弹出层 -->
    <div class="popup" id="filterPopup">
      <!-- 遮罩 -->
      <div class="overlay" onclick="closePopup()"></div>

      <!-- 底部弹出内容 -->
      <div class="modal-bottom">
        <!-- 导航栏 -->
        <div class="modal-header">
          <div class="modal-title">
            <span>全部筛选</span>
          </div>
          <div class="modal-close" onclick="closePopup()">
            <img src="images/icon_close.svg" alt="关闭">
          </div>
        </div>

        <!-- 内容区 -->
        <div class="modal-body">
          <!-- 左侧 sidebar -->
          <div class="sidebar" id="sidebar">
            <div class="sidebar-item active" data-index="0"><div class="sidebar-text-group"><span>服务/物流</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="1"><div class="sidebar-text-group"><span>价格区间</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="2"><div class="sidebar-text-group"><span>品牌</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="3"><div class="sidebar-text-group"><span>机身内存</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="4"><div class="sidebar-text-group"><span>屏幕尺寸</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="5"><div class="sidebar-text-group"><span>CPU型号</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="6"><div class="sidebar-text-group"><span>电池容量</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="7"><div class="sidebar-text-group"><span>充电功率充电功率充电功率</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="8"><div class="sidebar-text-group"><span>运行内存</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="9"><div class="sidebar-text-group"><span>屏幕材质</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="10"><div class="sidebar-text-group"><span>刷新率</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="11"><div class="sidebar-text-group"><span>防水等级</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="12"><div class="sidebar-text-group"><span>主摄像素</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="13"><div class="sidebar-text-group"><span>前置摄像头像素</span><div class="red-dot"></div></div></div>
            <div class="sidebar-item" data-index="14"><div class="sidebar-text-group"><span>其他</span><div class="red-dot"></div></div></div>
          </div>

          <!-- 右侧 feeds -->
          <div class="feeds" id="feeds">
            <div class="feeds-content">
              <!-- 0. 服务/物流 -->
              <div class="filter-group" id="section-0">
                <div class="filter-group-title">
                  <h3>服务/物流</h3>
                </div>
                <div class="tag-grid cols-2">
                  <button class="tag" onclick="toggleTag(this)"><span>唯品自营</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>次日达</span></button>
                </div>
              </div>

              <!-- 1. 价格区间 -->
              <div class="filter-group" id="section-1">
                <div class="filter-group-title">
                  <h3>价格区间</h3>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                  <div class="price-input-row">
                    <button class="price-input"><input type="text" placeholder="最低价"></button>
                    <button class="price-input"><input type="text" placeholder="最高价"></button>
                    <div class="price-line"></div>
                  </div>
                  <div class="tag-grid cols-3">
                    <button class="tag" onclick="toggleTag(this)"><span>¥800以下</span></button>
                    <button class="tag" onclick="toggleTag(this)"><span>¥800-¥1500</span></button>
                    <button class="tag" onclick="toggleTag(this)"><span>¥1500以上</span></button>
                  </div>
                </div>
              </div>

              <!-- 2. 品牌 -->
              <div class="filter-group" id="section-2">
                <div class="filter-group-title">
                  <h3>品牌</h3>
                </div>
                <div class="tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>OPPO</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>小米</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>荣耀</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>华为</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>摩托罗拉索尼爱立信</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>realme</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>一加</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>魅族</span></button>
                  <button class="tag more-tag" onclick="toggleTag(this)">
                    <span>更多品牌</span>
                    <img class="arrow-right" src="images/icon_arrow_right.svg" alt="">
                  </button>
                </div>
              </div>

              <!-- 3. 机身内存 -->
              <div class="filter-group" id="section-3">
                <div class="filter-group-title">
                  <h3>机身内存</h3>
                  <div class="expand-btn" onclick="toggleExpand(this)">
                    <span>展开</span>
                    <img class="arrow-icon" src="images/icon_arrow_up.svg" alt="">
                  </div>
                </div>
                <div class="tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>1TB</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>512G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>256G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>128G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>64G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>32G及以下</span></button>
                </div>
                <div class="expand-content tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>16G+1TB</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>16G+512G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>12G+512G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>12G+256G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>8G+256G</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>8G+128G</span></button>
                </div>
              </div>

              <!-- 4. 屏幕尺寸 -->
              <div class="filter-group" id="section-4">
                <div class="filter-group-title">
                  <h3>屏幕尺寸</h3>
                  <div class="expand-btn" onclick="toggleExpand(this)">
                    <span>展开</span>
                    <img class="arrow-icon" src="images/icon_arrow_up.svg" alt="">
                  </div>
                </div>
                <div class="tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>7英寸以上</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.8-7.0英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.5-6.8英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.1-6.5英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>5.5-6.1英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>5.5英寸以下</span></button>
                </div>
                <div class="expand-content tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>6.78英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.74英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.67英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.55英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.36英寸</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>6.28英寸</span></button>
                </div>
              </div>

              <!-- 5. CPU型号 -->
              <div class="filter-group" id="section-5">
                <div class="filter-group-title">
                  <h3>CPU型号</h3>
                  <div class="expand-btn" onclick="toggleExpand(this)">
                    <span>展开</span>
                    <img class="arrow-icon" src="images/icon_arrow_up.svg" alt="">
                  </div>
                </div>
                <div class="tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>骁龙8 Gen3</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>骁龙8 Gen2</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>骁龙7+ Gen3</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>天玑9300</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>天玑8300</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>麒麟9000S</span></button>
                </div>
                <div class="expand-content tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>骁龙7 Gen3</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>骁龙6 Gen1</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>天玑7200</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>天玑6020</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>麒麟8000</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>麒麟710A</span></button>
                </div>
              </div>

              <!-- 6. 电池容量 -->
              <div class="filter-group" id="section-6">
                <div class="filter-group-title">
                  <h3>电池容量</h3>
                </div>
                <div class="tag-grid cols-3">
                  <button class="tag" onclick="toggleTag(this)"><span>5000mAh以上</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>4500-5000mAh</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>4000-4500mAh</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>3500-4000mAh</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>3000-3500mAh</span></button>
                  <button class="tag" onclick="toggleTag(this)"><span>3000mAh以下</span></button>
                </div>
              </div>

              <!-- 7. 充电功率 -->
              <div class="filter-group" id="section-7">
                <div class="filter-group-title">
                  <h3>充电功率</h3>
                </div>

  <script>
    /* sidebar 分类切换 + 锚点定位 */
    document.getElementById('sidebar').addEventListener('click', function(e) {
      var item = e.target.closest('.sidebar-item');
      if (!item) return;

      document.querySelectorAll('.sidebar-item').forEach(function(el) {
        el.classList.remove('active');
      });
      item.classList.add('active');

      /* 点击期间暂停 scroll spy，避免滚动过程中选中态跳回 */
      scrollSpyActive = false;

      /* 滚动 feeds 到对应分组顶部 */
      var index = item.getAttribute('data-index');
      var section = document.getElementById('section-' + index);
      var feeds = document.getElementById('feeds');
      if (section && feeds) {
        feeds.scrollTo({
          top: section.offsetTop - feeds.querySelector('.feeds-content').offsetTop,
          behavior: 'smooth'
        });
      }

      /* 滚动结束后恢复 scroll spy */
      setTimeout(function() {
        scrollSpyActive = true;
      }, 400);
    });

    /* 筛选标签选中/取消（多选 + 反选） */
    function toggleTag(el) {
      el.classList.toggle('selected');
      updateRedDots();
    }

    /* feeds 滚动联动 sidebar */
    var feedsEl = document.getElementById('feeds');
    var sidebarItems = document.querySelectorAll('.sidebar-item');
    var scrollSpyActive = true; /* 标记是否由滚动触发 */

    feedsEl.addEventListener('scroll', function() {
      if (!scrollSpyActive) return;

      var sections = feedsEl.querySelectorAll('.filter-group');
      var scrollTop = feedsEl.scrollTop;
      var activeIndex = 0;

      /* 找到当前可见区域顶部的分组 */
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].offsetTop - sections[0].offsetTop <= scrollTop + 20) {
          activeIndex = i;
        }
      }

      /* 更新 sidebar 选中态 */
      sidebarItems.forEach(function(el, idx) {
        if (idx === activeIndex) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });

      /* 联动 sidebar 滚动，选中项对齐到顶部 */
      var activeItem = sidebarItems[activeIndex];
      if (activeItem) {
        var sidebar = document.getElementById('sidebar');
        /* 目标：把选中项滚动到 sidebar 顶部 */
        var targetTop = activeItem.offsetTop - sidebar.offsetTop;
        /* 不超过最大可滚动距离 */
        var maxScroll = sidebar.scrollHeight - sidebar.clientHeight;
        var clampedTop = Math.min(targetTop, maxScroll);
        clampedTop = Math.max(0, clampedTop);
        sidebar.scrollTop = clampedTop;
      }
    });

    /* 展开/收起 */
    function toggleExpand(btn) {
      var expanded = btn.classList.toggle('expanded');
      var label = btn.querySelector('span');
      label.textContent = expanded ? '收起' : '展开';

      /* 切换展开内容 */
      var group = btn.closest('.filter-group');
      var extra = group.querySelector('.expand-content');
      if (extra) {
        if (expanded) {
          extra.classList.add('show');
        } else {
          extra.classList.remove('show');
        }
      }
    }

    /* 打开弹窗 */
    function openPopup() {
      var popup = document.getElementById('filterPopup');
      popup.style.display = '';
      popup.classList.remove('hiding');
      /* 下一帧添加 showing，触发上滑动画 */
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          popup.classList.add('showing');
        });
      });
    }

    /* 关闭弹窗 */
    function closePopup() {
      var popup = document.getElementById('filterPopup');
      popup.classList.remove('showing');
      popup.classList.add('hiding');
      setTimeout(function() {
        popup.style.display = 'none';
        popup.classList.remove('hiding');
      }, 300);
    }

    /* 重置所有选中 */
    function resetAll() {
      document.querySelectorAll('.tag.selected').forEach(function(tag) {
        tag.classList.remove('selected');
      });
      updateRedDots();
    }

    /* 更新 sidebar 红点状态 */
    function updateRedDots() {
      var sidebarItems = document.querySelectorAll('.sidebar-item');
      sidebarItems.forEach(function(item) {
        var index = item.getAttribute('data-index');
        var section = document.getElementById('section-' + index);
        var redDot = item.querySelector('.red-dot');
        if (section && redDot) {
          var hasSelected = section.querySelectorAll('.tag.selected').length > 0;
          if (hasSelected) {
            redDot.classList.add('visible');
          } else {
            redDot.classList.remove('visible');
          }
        }
      });
    }

    /* 确定筛选 */
    function confirmFilter() {
      var selected = [];
      document.querySelectorAll('.tag.selected span').forEach(function(span) {
        selected.push(span.textContent);
      });
      console.log('选中的筛选条件:', selected);
    }
  </script>
