<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>运营商一键登录 - 唯品会</title>
  <link rel="stylesheet" href="../../../css/index.css">
  <style>
    /* 移动端基础样式 */
    html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: var(--yds-bg-default-white);
      min-height: 100vh;
      font-family: var(--yds-font-family-base);
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .mobile-container {
      width: 100%;
      max-width: var(--yds-screen-mobile);
      margin: 0 auto;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      background: linear-gradient(180deg, #FFEFF8 0%, #FFFFFF 100%);
    }

    /* 背景装饰圆圈 */
    .bg-circles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 400px;
      overflow: hidden;
      z-index: 0;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 119, 231, 0.08);
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -80px;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      top: -80px;
      left: -60px;
    }

    .bg-circle-3 {
      width: 200px;
      height: 200px;
      top: -60px;
      left: -40px;
    }

    /* 内容区域 */
    .content {
      position: relative;
      z-index: 1;
      padding: 0 16px;
      padding-top: 60px;
    }

    /* Logo 区域 */
    .logo-section {
      margin-bottom: 40px;
    }

    .logo-image {
      width: 250px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* 品牌标语 */
    .brand-slogan {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-secondary);
    }

    .slogan-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .slogan-dot {
      width: 2px;
      height: 2px;
      background-color: var(--yds-text-default-tertiary);
      border-radius: 50%;
    }

    /* 无法登录按钮（右上角） */
    .help-button {
      position: absolute;
      top: 52px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-secondary);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* 表单区域 */
    .form-section {
      background-color: var(--yds-bg-default-white);
      border-radius: var(--yds-radius-lg);
      padding: 20px 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      margin-top: 100px;
    }

    /* 手机号显示区域 */
    .phone-display-section {
      text-align: center;
      padding: 24px 0;
    }

    .phone-number {
      font-size: var(--yds-font-size-28);
      font-weight: var(--yds-font-weight-medium);
      color: var(--yds-text-default-default);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .phone-edit {
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .carrier-text {
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-tertiary);
    }

    /* 按钮区域 */
    .button-section {
      margin-top: 20px;
    }

    .login-button {
      width: 100%;
      height: 48px;
      border: none;
      position: relative;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .login-button-inner {
      width: 100%;
      height: 100%;
      background-color: var(--yds-bg-default-black);
      color: var(--yds-text-default-white);
      font-size: var(--yds-font-size-15);
      font-weight: var(--yds-font-weight-medium);
      border: none;
      border-radius: var(--yds-radius-none);
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .login-button-inner.active {
      opacity: 1;
    }

    /* 协议勾选框 */
    .agreement-section {
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .agreement-text {
      font-size: var(--yds-font-size-12);
      color: var(--yds-text-default-tertiary);
      line-height: 1.4;
    }

    .agreement-link {
      color: var(--yds-text-brand-default);
      text-decoration: none;
    }

    /* 换个方式登录按钮 */
    .switch-method-button {
      width: 100%;
      margin-top: 24px;
      padding: 12px 16px;
      background: none;
      border: none;
      border-top: 1px solid var(--yds-border-default-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: var(--yds-font-size-14);
      color: var(--yds-text-default-secondary);
      cursor: pointer;
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: var(--yds-text-default-white);
      padding: 12px 24px;
      border-radius: var(--yds-radius-sm);
      font-size: var(--yds-font-size-14);
      z-index: 9999;
      display: none;
      text-align: center;
      max-width: 80%;
    }

    .toast.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* 页脚 */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background-color: var(--yds-bg-default-white);
      text-align: center;
      font-size: var(--yds-font-size-11);
      color: var(--yds-text-default-disabled);
      border-top: 1px solid var(--yds-border-default-tertiary);
    }
  </style>
</head>
<body>
  <div class="mobile-container">
    <!-- 背景装饰 -->
    <div class="bg-circles">
      <div class="bg-circle bg-circle-1"></div>
      <div class="bg-circle bg-circle-2"></div>
      <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- 无法登录按钮 -->
    <button class="help-button" onclick="showToast('无法登录')">
      无法登录
      <img src="../../../icons/y_icon_line_edit_help.svg" alt="帮助" style="width: 14px; height: 14px;">
    </button>

    <!-- 内容区域 -->
    <div class="content">
      <!-- Logo 区域 -->
      <div class="logo-section">
        <div style="text-align: center; font-size: 28px; font-weight: bold; color: var(--yds-text-brand-default);">
          唯品会
        </div>
      </div>

      <!-- 表单区域 -->
      <div class="form-section">
        <!-- 手机号显示 -->
        <div class="phone-display-section">
          <div class="phone-number">
            199****9999
            <button class="phone-edit" onclick="window.location.href='login-phone.html'">
              <img src="../../../icons/y_icon_line_edit_edit.svg" alt="编辑" style="width: 18px; height: 18px;">
            </button>
          </div>
          <div class="carrier-text">中国联通提供认证服务</div>
        </div>

        <!-- 按钮区域 -->
        <div class="button-section">
          <button class="login-button" id="loginButton" onclick="handleLogin()" disabled>
            <div class="login-button-inner" id="loginButtonInner">本机号码一键登录</div>
          </button>
        </div>

        <!-- 协议勾选框 -->
        <div class="agreement-section">
          <label class="yds-checkbox yds-checkbox--small">
            <input type="checkbox" class="yds-checkbox__input" id="agreementCheckbox" onchange="updateLoginButton()">
            <span class="yds-checkbox__box"></span>
          </label>
          <div class="agreement-text">
            我已阅读并同意<a href="#" class="agreement-link">《唯品会服务条款》</a><a href="#" class="agreement-link">《唯品支付用户服务协议》</a>
          </div>
        </div>

        <!-- 换个方式登录 -->
        <button class="switch-method-button" onclick="window.location.href='login-phone.html'">
          换个方式登录
          <img src="../../../icons/y_icon_line_direction_arrow_left.svg" alt="箭头" style="width: 14px; height: 14px; transform: rotate(180deg);">
        </button>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      唯品会提供技术支持
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // 更新登录按钮状态
    function updateLoginButton() {
      const agreed = document.getElementById('agreementCheckbox').checked;
      const buttonInner = document.getElementById('loginButtonInner');
      const button = document.getElementById('loginButton');

      if (agreed) {
        buttonInner.classList.add('active');
        button.disabled = false;
      } else {
        buttonInner.classList.remove('active');
        button.disabled = true;
      }
    }

    // 处理登录
    function handleLogin() {
      const agreed = document.getElementById('agreementCheckbox').checked;

      if (!agreed) {
        showToast('请阅读并同意协议');
        return;
      }

      // 模拟登录请求
      showToast('登录成功');
      setTimeout(() => {
        window.location.href = 'login-phone.html';
      }, 1500);
    }

    // 显示 Toast 提示
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 复选框视觉状态切换
    const checkbox = document.getElementById('agreementCheckbox');
    checkbox.addEventListener('change', function() {
      if (this.checked) {
        this.closest('.yds-checkbox').classList.add('yds-checkbox--checked');
      } else {
        this.closest('.yds-checkbox').classList.remove('yds-checkbox--checked');
      }
    });
  </script>
</body>
</html>
