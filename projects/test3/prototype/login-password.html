<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>账号密码登录 - 唯品会</title>
  <link rel="stylesheet" href="../../../css/index.css">
  <style>
    /* 移动端基础样式 */
    html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: var(--yds-bg-default-white);
      min-height: 100vh;
      font-family: var(--yds-font-family-base);
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .mobile-container {
      width: 100%;
      max-width: var(--yds-screen-mobile);
      margin: 0 auto;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      background-color: var(--yds-bg-default-white);
    }

    /* 导航栏 */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      border-bottom: 1px solid var(--yds-border-default-tertiary);
      background-color: var(--yds-bg-default-white);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .navbar-back {
      width: 22px;
      height: 22px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .navbar-title {
      font-size: var(--yds-font-size-15);
      font-weight: var(--yds-font-weight-medium);
      color: var(--yds-text-default-default);
    }

    .navbar-placeholder {
      width: 22px;
    }

    /* 内容区域 */
    .content {
      padding: 0 16px;
      padding-top: 24px;
    }

    /* 页面标题 */
    .page-title {
      font-size: var(--yds-font-size-20);
      font-weight: var(--yds-font-weight-medium);
      color: var(--yds-text-default-default);
      margin-bottom: 32px;
    }

    /* 表单区域 */
    .form-section {
      background-color: var(--yds-bg-default-white);
    }

    /* 输入框容器 */
    .input-container {
      position: relative;
      margin-bottom: 4px;
    }

    .input-field {
      width: 100%;
      height: 48px;
      padding: 0 12px;
      font-size: var(--yds-font-size-15);
      color: var(--yds-text-default-default);
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--yds-border-default-tertiary);
      outline: none;
      transition: border-color 0.3s;
    }

    .input-field::placeholder {
      color: var(--yds-text-default-tertiary);
    }

    .input-field:focus {
      border-bottom-color: var(--yds-text-brand-default);
    }

    /* 密码显示/隐藏按钮 */
    .password-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    /* 按钮区域 */
    .button-section {
      margin-top: 20px;
    }

    .login-button {
      width: 100%;
      height: 48px;
      border: none;
      position: relative;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .login-button-inner {
      width: 100%;
      height: 100%;
      background-color: var(--yds-bg-default-black);
      color: var(--yds-text-default-white);
      font-size: var(--yds-font-size-15);
      font-weight: var(--yds-font-weight-medium);
      border: none;
      border-radius: var(--yds-radius-none);
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .login-button-inner.active {
      opacity: 1;
    }

    /* 协议勾选框 */
    .agreement-section {
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .agreement-text {
      font-size: var(--yds-font-size-12);
      color: var(--yds-text-default-tertiary);
      line-height: 1.4;
    }

    .agreement-link {
      color: var(--yds-text-brand-default);
      text-decoration: none;
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: var(--yds-text-default-white);
      padding: 12px 24px;
      border-radius: var(--yds-radius-sm);
      font-size: var(--yds-font-size-14);
      z-index: 9999;
      display: none;
      text-align: center;
      max-width: 80%;
    }

    .toast.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-container">
    <!-- 导航栏 -->
    <div class="navbar">
      <button class="navbar-back" onclick="window.location.href='login-phone.html'">
        <img src="../../../icons/y_icon_line_direction_arrow_left.svg" alt="返回" style="width: 22px; height: 22px;">
      </button>
      <div class="navbar-title">账号密码登录</div>
      <div class="navbar-placeholder"></div>
    </div>

    <!-- 内容区域 -->
    <div class="content">
      <!-- 页面标题 -->
      <div class="page-title">账号密码登录</div>

      <!-- 表单区域 -->
      <div class="form-section">
        <!-- 用户名/绑定手机/绑定邮箱输入框 -->
        <div class="input-container">
          <input
            type="text"
            class="input-field"
            id="usernameInput"
            placeholder="用户名/绑定手机/绑定邮箱"
            oninput="updateLoginButton()"
          >
        </div>

        <!-- 密码输入框 -->
        <div class="input-container">
          <input
            type="password"
            class="input-field"
            id="passwordInput"
            placeholder="请输入密码"
            oninput="updateLoginButton()"
          >
          <button class="password-toggle" id="passwordToggle" onclick="togglePassword()">
            <img src="../../../icons/y_icon_line_edit_passwordhidden.svg" alt="显示密码" id="passwordToggleIcon" style="width: 20px; height: 20px;">
          </button>
        </div>

        <!-- 按钮区域 -->
        <div class="button-section">
          <button class="login-button" id="loginButton" onclick="handleLogin()" disabled>
            <div class="login-button-inner" id="loginButtonInner">登录</div>
          </button>
        </div>

        <!-- 协议勾选框 -->
        <div class="agreement-section">
          <label class="yds-checkbox yds-checkbox--small">
            <input type="checkbox" class="yds-checkbox__input" id="agreementCheckbox" onchange="updateLoginButton()">
            <span class="yds-checkbox__box"></span>
          </label>
          <div class="agreement-text">
            我已阅读并同意<a href="#" class="agreement-link">《唯品会服务条款》</a><a href="#" class="agreement-link">《唯品支付用户服务协议》</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    let passwordVisible = false;

    // 切换密码显示/隐藏
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('passwordToggleIcon');

      passwordVisible = !passwordVisible;

      if (passwordVisible) {
        input.type = 'text';
        icon.src = '../../../icons/y_icon_line_edit_passwordvisible.svg';
        icon.alt = '隐藏密码';
      } else {
        input.type = 'password';
        icon.src = '../../../icons/y_icon_line_edit_passwordhidden.svg';
        icon.alt = '显示密码';
      }

      input.focus();
    }

    // 更新登录按钮状态
    function updateLoginButton() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const agreed = document.getElementById('agreementCheckbox').checked;
      const buttonInner = document.getElementById('loginButtonInner');

      const isValid = username.length > 0 && password.length > 0 && agreed;

      if (isValid) {
        buttonInner.classList.add('active');
      } else {
        buttonInner.classList.remove('active');
      }
    }

    // 处理登录
    function handleLogin() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const agreed = document.getElementById('agreementCheckbox').checked;

      if (!username) {
        showToast('请输入用户名/绑定手机/绑定邮箱');
        return;
      }

      if (!password) {
        showToast('请输入密码');
        return;
      }

      if (!agreed) {
        showToast('请阅读并同意协议');
        return;
      }

      // 模拟登录请求
      showToast('登录成功');
      setTimeout(() => {
        window.location.href = 'login-phone.html';
      }, 1500);
    }

    // 显示 Toast 提示
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 复选框视觉状态切换
    const checkbox = document.getElementById('agreementCheckbox');
    checkbox.addEventListener('change', function() {
      if (this.checked) {
        this.closest('.yds-checkbox').classList.add('yds-checkbox--checked');
      } else {
        this.closest('.yds-checkbox').classList.remove('yds-checkbox--checked');
      }
    });
  </script>
</body>
</html>
