<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>账号密码登录 - 唯品会</title>
  <link rel="stylesheet" href="../css/index.css">
  <script src="radio-interactive.js"></script>
  <style>
    /* ========== 移动端基础样式 ========== */
    html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
    }

    body {
      background-color: var(--yds-bg-default-white);
      height: 100vh;
      font-family: var(--yds-font-family-base);
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .mobile-container {
      width: 100%;
      max-width: var(--yds-screen-mobile);
      margin: 0 auto;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
      position: relative;
    }

    /* ========== 页面特定样式 ========== */
    .page-header {
      display: flex;
      align-items: center;
      padding: var(--yds-spacing-16) 0;
      margin-bottom: var(--yds-spacing-24);
    }

    .back-button {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--yds-radius-full);
      transition: background-color 0.3s;
    }

    .back-button:active {
      background-color: var(--yds-bg-transp-black-4-pct);
    }

    .back-button img {
      width: 24px;
      height: 24px;
    }

    .page-title {
      flex: 1;
      text-align: center;
      font-size: var(--yds-font-size-17);
      font-weight: var(--yds-font-weight-medium);
      color: var(--yds-text-default-default);
    }

    .input-group {
      margin-bottom: var(--yds-spacing-16);
      position: relative;
    }

    .input-label {
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-secondary);
      margin-bottom: var(--yds-spacing-8);
      display: block;
    }

    .input-field {
      width: 100%;
      height: 48px;
      border: none;
      border-bottom: 1px solid var(--yds-border-default-tertiary);
      font-size: var(--yds-font-size-15);
      color: var(--yds-text-default-default);
      padding: 0;
      padding-right: 48px;
      background: transparent;
      outline: none;
      box-sizing: border-box;  /* 确保padding包含在宽度内 */
      transition: border-color 0.3s;
    }

    .input-field:focus {
      border-bottom-color: var(--yds-border-default-default);
    }

    .input-field::placeholder {
      color: var(--yds-text-default-disabled);
    }

    .password-toggle {
      position: absolute;
      right: 0;
      top: 32px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .password-toggle img {
      width: 20px;
      height: 20px;
    }

    .agreement-section {
      margin-top: var(--yds-spacing-16);
      margin-bottom: var(--yds-spacing-24);
      display: flex;
      align-items: center;  /* 确保单选框和文字垂直居中对齐 */
    }

    .agreement-text {
      font-size: var(--yds-font-size-12);
      color: var(--yds-text-default-secondary);
      margin-left: var(--yds-spacing-8);
    }

    .agreement-link {
      color: var(--yds-text-utils-03-default);  /* 使用Text/Utils/03/Default颜色（蓝色）*/
      text-decoration: none;  /* 无下划线 */
    }

    .error-message {
      font-size: var(--yds-font-size-12);
      color: var(--yds-text-danger-default);
      margin-top: var(--yds-spacing-4);
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--yds-bg-transp-black-50-pct);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-overlay.show {
      display: flex;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--yds-border-default-tertiary);
      border-top-color: var(--yds-text-brand-default);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 移动端容器 -->
  <div class="mobile-container">
    <!-- 栅格系统 -->
    <div class="yds-grid">
      <div class="yds-grid__cell yds-grid__cell--12">
        <div class="yds-grid__cell-content">

          <!-- 页面头部 -->
          <div class="page-header">
            <div class="back-button" onclick="goBack()">
              <img src="../icons/y_icon_line_direction_arrow_left.svg" alt="返回">
            </div>
            <div class="page-title">账号密码登录</div>
            <div style="width: 40px;"></div>
          </div>

          <!-- 账号输入 -->
          <div class="input-group">
            <label class="input-label" for="account">账号</label>
            <input
              type="text"
              id="account"
              class="input-field"
              placeholder="请输入用户名/手机号/邮箱"
              oninput="validateAccount()"
            >
            <div class="error-message" id="account-error">请输入账号</div>
          </div>

          <!-- 密码输入 -->
          <div class="input-group">
            <label class="input-label" for="password">密码</label>
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder="请输入密码"
              oninput="validatePassword()"
            >
            <div class="password-toggle" onclick="togglePassword()">
              <img src="../icons/y_icon_line_edit_invisible.svg" alt="显示密码" id="password-toggle-icon">
            </div>
            <div class="error-message" id="password-error">请输入密码</div>
          </div>

          <!-- 协议勾选 -->
          <div class="agreement-section">
            <label class="yds-radio yds-radio--small">
              <input type="radio" class="yds-radio__input" id="agreement" name="agreement" value="agree" data-radio-toggle>
              <span class="yds-radio__circle"></span>
            </label>
            <span class="agreement-text">
              我已阅读并同意
              <a href="javascript:void(0)" class="agreement-link">《用户协议》</a>
              和
              <a href="javascript:void(0)" class="agreement-link">《隐私政策》</a>
            </span>
          </div>

          <!-- 登录按钮 -->
          <button
            id="login-btn"
            class="yds-button yds-button--solid-dark yds-button--black yds-button--xl"
            style="width: 100%;"
            onclick="handleLogin()"
          >
            登录
          </button>

        </div>
      </div>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast 组件 -->
  <div id="yds-toast" class="yds-toast yds-toast--default" style="display: none;">
    <div class="yds-toast__text"></div>
  </div>

  <script>
    let isPasswordVisible = false;

    // ========== 账号验证 ==========
    function validateAccount() {
      const account = document.getElementById('account').value.trim();
      const accountError = document.getElementById('account-error');

      if (account.length > 0) {
        accountError.classList.remove('show');
      }
    }

    // ========== 密码验证 ==========
    function validatePassword() {
      const password = document.getElementById('password').value;
      const passwordError = document.getElementById('password-error');

      if (password.length > 0) {
        passwordError.classList.remove('show');
      }
    }

    // ========== 密码可见性切换 ==========
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('password-toggle-icon');

      isPasswordVisible = !isPasswordVisible;

      if (isPasswordVisible) {
        passwordInput.type = 'text';
        toggleIcon.src = '../icons/y_icon_line_edit_passwordvisible.svg';
        toggleIcon.alt = '隐藏密码';
      } else {
        passwordInput.type = 'password';
        toggleIcon.src = '../icons/y_icon_line_edit_invisible.svg';
        toggleIcon.alt = '显示密码';
      }
    }

    // ========== 登录处理 ==========
    function handleLogin() {
      const account = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;
      const agreement = document.getElementById('agreement');
      const accountError = document.getElementById('account-error');
      const passwordError = document.getElementById('password-error');

      // 验证账号
      if (!account) {
        accountError.classList.add('show');
        showToast('请输入账号');
        return;
      }

      // 验证密码
      if (!password) {
        passwordError.classList.add('show');
        showToast('请输入密码');
        return;
      }

      // 验证协议勾选
      if (!agreement.checked) {
        showToast('请先阅读并同意用户协议和隐私政策');
        return;
      }

      // 显示加载遮罩
      document.getElementById('loading-overlay').classList.add('show');

      // 模拟登录请求
      setTimeout(() => {
        document.getElementById('loading-overlay').classList.remove('show');

        // 这里应该调用后端API验证
        // 模拟验证成功
        showToast('登录成功');

        setTimeout(() => {
          // 登录成功后跳转到首页
          window.location.href = 'login-success.html';
        }, 1000);
      }, 2000);
    }

    // ========== 返回 ==========
    function goBack() {
      window.location.href = 'login-sms-step1.html';
    }

    // ========== Toast 提示 ==========
    function showToast(message, duration = 2000) {
      const toast = document.getElementById('yds-toast');
      const toastText = toast.querySelector('.yds-toast__text');

      toastText.textContent = message;
      toast.style.display = 'flex';
      toast.classList.add('yds-toast--fade-in');

      setTimeout(() => {
        toast.classList.remove('yds-toast--fade-in');
        toast.classList.add('yds-toast--fade-out');

        setTimeout(() => {
          toast.style.display = 'none';
          toast.classList.remove('yds-toast--fade-out');
        }, 300);
      }, duration);
    }
  </script>
</body>
</html>
