<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注册 - 唯品会</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    /* ========== 移动端基础样式 ========== */
    html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
    }

    body {
      background-color: var(--yds-bg-default-white);
      height: 100vh;
      font-family: var(--yds-font-family-base);
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .mobile-container {
      width: 100%;
      max-width: var(--yds-screen-mobile);
      margin: 0 auto;
      overflow-x: hidden;
      overflow-y: hidden;  /* 禁止垂直滚动条 */
      position: relative;
    }

    /* ========== 页面特定样式 ========== */
    .page-header {
      display: flex;
      align-items: center;
      padding: var(--yds-spacing-16) 0;
      margin-bottom: var(--yds-spacing-24);
    }

    .back-button {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--yds-radius-full);
      transition: background-color 0.3s;
    }

    .back-button:active {
      background-color: var(--yds-bg-transp-black-4-pct);
    }

    .back-button img {
      width: 24px;
      height: 24px;
    }

    .page-title {
      flex: 1;
      text-align: center;
      font-size: var(--yds-font-size-17);
      font-weight: var(--yds-font-weight-medium);
      color: var(--yds-text-default-default);
    }

    .input-group {
      margin-bottom: var(--yds-spacing-16);
    }

    .input-label {
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-secondary);
      margin-bottom: var(--yds-spacing-8);
      display: block;
    }

    .input-field {
      width: 100%;
      height: 48px;
      border: none;
      border-bottom: 1px solid var(--yds-border-default-tertiary);
      font-size: var(--yds-font-size-15);
      color: var(--yds-text-default-default);
      padding: 0;
      background: transparent;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;  /* 确保padding包含在宽度内 */
      transition: border-color 0.3s;
    }

    .input-field:focus {
      border-bottom-color: var(--yds-border-default-default);
    }

    .input-field::placeholder {
      color: var(--yds-text-default-disabled);
    }

    .input-field.error {
      border-bottom-color: var(--yds-bg-danger-default);
    }

    .error-message {
      font-size: var(--yds-font-size-12);
      color: var(--yds-text-danger-default);
      margin-top: var(--yds-spacing-4);
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .login-link-section {
      text-align: center;
      margin-top: var(--yds-spacing-24);
    }

    .login-link {
      font-size: var(--yds-font-size-13);
      color: var(--yds-text-default-secondary);
      text-decoration: none;
      position: relative;
    }

    .login-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1px;
      background-color: var(--yds-border-default-secondary);
    }
  </style>
</head>
<body>
  <!-- 移动端容器 -->
  <div class="mobile-container">
    <!-- 栅格系统 -->
    <div class="yds-grid">
      <div class="yds-grid__cell yds-grid__cell--12">
        <div class="yds-grid__cell-content">

          <!-- 页面头部 -->
          <div class="page-header">
            <div class="back-button" onclick="goBack()">
              <img src="../icons/y_icon_line_direction_arrow_left.svg" alt="返回">
            </div>
            <div class="page-title">注册账号</div>
            <div style="width: 40px;"></div>
          </div>

          <!-- 手机号输入 -->
          <div class="input-group">
            <label class="input-label" for="phone">手机号</label>
            <input
              type="tel"
              id="phone"
              class="input-field"
              placeholder="请输入手机号"
              maxlength="11"
              oninput="validatePhone()"
            >
            <div class="error-message" id="phone-error">请输入正确的手机号</div>
          </div>

          <!-- 下一步按钮 -->
          <button
            id="next-btn"
            class="yds-button yds-button--solid-dark yds-button--black yds-button--xl"
            style="width: 100%;"
            disabled
            onclick="handleNext()"
          >
            下一步
          </button>

          <!-- 跳转登录 -->
          <div class="login-link-section">
            <a href="login-sms-step1.html" class="login-link">已有账号？去登录</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Toast 组件 -->
  <div id="yds-toast" class="yds-toast yds-toast--default" style="display: none;">
    <div class="yds-toast__text"></div>
  </div>

  <script>
    // ========== 手机号验证 ==========
    function validatePhone() {
      const phone = document.getElementById('phone').value;
      const phoneRegex = /^1[3-9]\d{9}$/;
      const phoneError = document.getElementById('phone-error');
      const nextBtn = document.getElementById('next-btn');

      if (phone.length === 0) {
        phoneError.classList.remove('show');
        nextBtn.disabled = true;
        return false;
      }

      if (phone.length === 11 && phoneRegex.test(phone)) {
        phoneError.classList.remove('show');
        nextBtn.disabled = false;
        return true;
      } else {
        if (phone.length === 11) {
          phoneError.classList.add('show');
        }
        nextBtn.disabled = true;
        return false;
      }
    }

    // ========== 下一步处理 ==========
    function handleNext() {
      const phone = document.getElementById('phone').value;

      if (validatePhone()) {
        // 跳转到注册页面二
        window.location.href = 'register-step2.html?phone=' + phone;
      }
    }

    // ========== 返回 ==========
    function goBack() {
      window.location.href = 'login-sms-step1.html';
    }

    // ========== Toast 提示 ==========
    function showToast(message, duration = 2000) {
      const toast = document.getElementById('yds-toast');
      const toastText = toast.querySelector('.yds-toast__text');

      toastText.textContent = message;
      toast.style.display = 'flex';
      toast.classList.add('yds-toast--fade-in');

      setTimeout(() => {
        toast.classList.remove('yds-toast--fade-in');
        toast.classList.add('yds-toast--fade-out');

        setTimeout(() => {
          toast.style.display = 'none';
          toast.classList.remove('yds-toast--fade-out');
        }, 300);
      }, duration);
    }
  </script>
</body>
</html>
